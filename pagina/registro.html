<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Casa Macondo</title>

    <link rel="stylesheet" href="css/registro.css">

    <!-- ICONOS -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <div class="contenedor">

        <!-- FORMULARIO -->
        <div class="formulario">

            <h1>Registro</h1>

            <label>Nombre</label>
            <div class="input-box">
                <i class="fa-regular fa-user"></i>
                <input type="text">
            </div>

            <label>Correo</label>
            <div class="input-box">
                <i class="fa-regular fa-envelope"></i>
                <input type="email">
            </div>

            <label>Contraseña</label>
            <div class="input-box">
                <i class="fa-solid fa-lock"></i>
                <input type="password">
            </div>

            <label>Confirmar contraseña</label>
            <div class="input-box">
                <i class="fa-solid fa-user-lock"></i>
                <input type="password">
            </div>

            <label>Teléfono</label>
            <div class="input-box">
                <i class="fa-solid fa-phone"></i>
                <input type="text">
            </div>

            <button class="btn">
                Confirmar
            </button>

            <p class="login-link">
                ¿Ya tienes cuenta?
                <a href="#">Inicia sesión</a>
            </p>

        </div>

        <!-- LOGO -->
        <div class="panel-logo">

            <img src="css/LogoGrande.png" alt="Casa Macondo">

        </div>

    </div>

</body>

</html>
